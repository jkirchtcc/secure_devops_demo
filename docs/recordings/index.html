<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure DevOps: Setting up a secure environment for Ansible — CyberForge 2026</title>
<link rel="stylesheet" href="asciinema-player.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Helvetica, Arial, sans-serif;
    background: #1a1a2e;
    color: #eee;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #topbar {
    background: #3c5078;
    padding: 0.6rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  #topbar h1 { font-size: 1rem; font-weight: bold; }
  #part-label { font-size: 0.85rem; opacity: 0.75; white-space: nowrap; margin-left: 1rem; }
  #counter { font-size: 0.9rem; opacity: 0.85; white-space: nowrap; }

  #content {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem 1rem 1rem;
    gap: 0.75rem;
    position: relative;
  }

  #entry-title {
    font-size: 1rem;
    font-weight: bold;
    color: #aac4f0;
    align-self: flex-start;
    max-width: 900px;
    width: 100%;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  /* ── Slide image ── */
  #slide-wrap {
    max-width: 900px;
    width: 100%;
  }
  #slide-imgs img {
    width: 100%;
    border: 1px solid #444;
    border-radius: 4px;
    display: block;
  }
  #slide-imgs img + img {
    margin-top: 0.5rem;
  }

  /* ── Annotation canvas — floats over the active content area ── */
  #annotation-canvas {
    position: absolute;
    display: none;
    border-radius: 4px;
    z-index: 10;
  }
  #annotation-canvas.laser { cursor: none; }
  #annotation-canvas.draw  { cursor: crosshair; }
  #annotation-canvas.box   { cursor: crosshair; }

  /* ── Annotation toolbar ── */
  #annotation-toolbar {
    display: none;
    align-self: flex-start;
    max-width: 900px;
    width: 100%;
    gap: 0.5rem;
    align-items: center;
    flex-wrap: wrap;
  }
  #annotation-toolbar.active { display: flex; }
  .ann-btn {
    background: #2a2a4a;
    border: 1px solid #555;
    color: #ccc;
    border-radius: 4px;
    padding: 0.3rem 0.75rem;
    font-size: 0.8rem;
    cursor: pointer;
  }
  .ann-btn:hover { background: #3a3a6a; }
  .ann-btn.active { background: #3c5078; border-color: #7aa0d4; color: white; }
  .ann-color {
    width: 20px; height: 20px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    flex-shrink: 0;
  }
  .ann-color.active { border-color: white; }

  /* ── Demo (asciinema) view ── */
  #demo-wrap {
    max-width: 900px;
    width: 100%;
  }
  #ap-container {
    width: 100%;
    border-radius: 4px;
    overflow: hidden;
  }
  #demo-pending {
    background: #222;
    border: 1px dashed #444;
    border-radius: 4px;
    color: #666;
    font-size: 0.85rem;
    text-align: center;
    padding: 3rem;
  }

  /* ── Nav bar ── */
  #navbar {
    flex-shrink: 0;
    background: #252540;
    border-top: 1px solid #333;
    padding: 0.75rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
  }
  button {
    background: #3c5078;
    color: white;
    border: none;
    border-radius: 4px;
    padding: 0.5rem 1.25rem;
    font-size: 0.9rem;
    cursor: pointer;
  }
  button:hover { background: #4d6490; }
  button:disabled { background: #333; color: #555; cursor: default; }
  #slide-dots { display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; max-width: 500px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #444; cursor: pointer; flex-shrink: 0; }
  .dot.active { background: #7aa0d4; }
  .dot.is-demo { background: #5a8a5a; border-radius: 2px; }
  .dot.is-demo.active { background: #8fd48f; }
  .dot.is-pending { background: #4a4a2a; border-radius: 2px; }
</style>
</head>
<body>

<div id="topbar">
  <div style="display:flex;align-items:center;gap:0.5rem;min-width:0">
    <h1>Secure DevOps — CyberForge 2026</h1>
    <span id="part-label"></span>
  </div>
  <span id="counter"></span>
</div>

<div id="content">
  <div id="entry-title">
    <span id="entry-title-text"></span>
    <button id="annotate-btn" onclick="toggleAnnotation()" title="Annotate (A)" style="font-size:0.75rem;padding:0.25rem 0.6rem;background:#2a2a4a;border:1px solid #555;color:#ccc;display:none">&#9998; Annotate</button>
  </div>

  <div id="annotation-toolbar">
    <button class="ann-btn active" id="mode-laser" onclick="setMode('laser')">&#128308; Laser</button>
    <button class="ann-btn" id="mode-draw"  onclick="setMode('draw')">&#9998; Draw</button>
    <button class="ann-btn" id="mode-box"   onclick="setMode('box')">&#9634; Box</button>
    <span style="margin-left:0.25rem;font-size:0.75rem;color:#666">Color:</span>
    <div class="ann-color active" id="color-red"    style="background:#ff3333" onclick="setColor('#ff3333')" title="Red"></div>
    <div class="ann-color"        id="color-yellow" style="background:#ffdd00" onclick="setColor('#ffdd00')" title="Yellow"></div>
    <div class="ann-color"        id="color-cyan"   style="background:#00ccff" onclick="setColor('#00ccff')" title="Cyan"></div>
    <button class="ann-btn" onclick="clearAnnotations()" style="margin-left:0.5rem">&#10005; Clear</button>
    <button class="ann-btn" onclick="toggleAnnotation()" style="margin-left:auto">Done</button>
  </div>

  <!-- Annotation canvas — repositioned over active content by syncCanvas() -->
  <canvas id="annotation-canvas"></canvas>

  <!-- Slide view -->
  <div id="slide-wrap" style="display:none">
    <div id="slide-imgs"></div>
  </div>

  <!-- Demo view -->
  <div id="demo-wrap" style="display:none">
    <div id="ap-container"></div>
    <div id="demo-pending" style="display:none">Recording coming soon</div>
  </div>
</div>

<div id="navbar">
  <button id="btn-prev" onclick="go(-1)">&#8592; Prev</button>
  <div id="slide-dots"></div>
  <button id="btn-next" onclick="go(1)">Next &#8594;</button>
</div>

<script src="asciinema-player.min.js"></script>
<script>
// ── Data ─────────────────────────────────────────────────────────────────────
const slideData = [
  { n:  1, imgs: ["slide-01.png"], title: "", cast: null, part: null },
  { n:  2, imgs: ["slide-02.png"], title: "Today's Topics", cast: null, part: null },
  { n:  3, imgs: ["slide-03.png"], title: "", cast: null, part: "Part 1: SSH Setup" },
  { n:  4, imgs: ["slide-04.png"], title: "Generate SSH Keys", cast: "slide-4.cast", part: null },
  { n:  5, imgs: ["../screenshots/Upload_SSH_Public_Key.png"], title: "Upload SSH Public Key", cast: null, part: null },
  { n:  6, imgs: ["../screenshots/RSA4096_vs_ED25519.png"], title: "RSA 4096 vs ED25519", cast: null, part: null },
  { n:  7, imgs: ["slide-07.png"], title: "Configure SSH Client", cast: "slide-7.cast", part: null },
  { n:  8, imgs: ["../screenshots/SSH_to_ansible-part1-A.png","../screenshots/SSH_to_ansible-part1-B.png"], title: "SSH to ansible, part 1", cast: null, part: null },
  { n:  9, imgs: ["../screenshots/Cybersecurity_Time.png"], title: "CyberSecurity Time", cast: null, part: null },
  { n: 10, imgs: ["../screenshots/Update_ssh_config-A.png","../screenshots/Update_ssh_config-B.png"], title: "Update ssh config", cast: null, part: null },
  { n: 11, imgs: ["slide-11.png"], title: "SSH Setup Summary", cast: null, part: null },
  { n: 12, imgs: ["slide-12.png"], title: "", cast: null, part: "Part 2: Ansible Setup" },
  { n: 13, imgs: ["../screenshots/Install_Ansible.png"], title: "Install Ansible", cast: null, part: null },
  { n: 14, imgs: ["../screenshots/Logout_Login-A.png","../screenshots/Logout_Login-B.png"], title: "Logout & Login", cast: null, part: null },
  { n: 15, imgs: ["../screenshots/Ansible_Installed.png"], title: "Ansible Installed", cast: "slide-13.cast", part: null },
  { n: 16, imgs: ["slide-16.png"], title: "", cast: null, part: "Part 3: Ansible Demo" },
  { n: 17, imgs: ["slide-17.png"], title: "Our First Ansible Playbook", cast: "slide-17.cast", part: null },
  { n: 18, imgs: ["slide-18.png"], title: "ansible.cfg", cast: null, part: null },
  { n: 19, imgs: ["../screenshots/Update_ansible_with_Ansible-A.png","../screenshots/Update_ansible_with_Ansible-B.png"], title: "Update ansible with Ansible", cast: "slide-19.cast", part: null },
  { n: 20, imgs: ["../screenshots/Ansible_with_sudo.png"], title: "Ansible with sudo", cast: null, part: null },
  { n: 21, imgs: ["slide-21.png"], title: "Storing Secrets in Ansible", cast: null, part: "Part 4: Storing Secrets" },
  { n: 22, imgs: ["slide-22.png"], title: "Ansible Vault", cast: "slide-22.cast", part: null },
  { n: 23, imgs: ["../screenshots/Lets_use_pass.png"], title: "Let's use pass", cast: "slide-23.cast", part: null },
  { n: 24, imgs: ["../screenshots/pass_uses_gpg-A.png","../screenshots/pass_uses_gpg-B.png","../screenshots/pass_uses_gpg-C.png","../screenshots/pass_uses_gpg-D.png"], title: "pass uses GPG", cast: null, part: null },
  { n: 25, imgs: ["slide-25.png"], title: "Update ansible.cfg for pass", cast: "slide-25.cast", part: null },
  { n: 26, imgs: ["../screenshots/Update_our_update-A.png","../screenshots/Update_our_update-B.png"], title: "Update our update.yml", cast: null, part: null },
  { n: 27, imgs: ["slide-27.png"], title: "Okay...", cast: null, part: null },
  { n: 28, imgs: ["slide-28.png"], title: "Let's spin up more machines", cast: "slide-28.cast", part: "Part 5: SSHD Hardening" },
  { n: 29, imgs: ["slide-29.png"], title: "Ansible to update .bashrc", cast: "slide-29.cast", part: null },
  { n: 30, imgs: ["../screenshots/idempotent.png"], title: "Idempotent", cast: "slide-30.cast", part: null },
  { n: 31, imgs: ["../screenshots/now_we_are_ready.png"], title: "Now we are ready", cast: "slide-31.cast", part: null },
  { n: 32, imgs: ["../screenshots/add_ansible_user_to_servers.png"], title: "Add ansible_user to servers", cast: "slide-32.cast", part: null },
  { n: null, imgs: ["../screenshots/wait_what.png"], title: "Wait, what?", cast: null, part: null },
  { n: 33, imgs: ["slide-33.png"], title: "Switch SSH config to ansible_user", cast: "slide-33.cast", part: null },
  { n: 34, imgs: ["slide-34.png"], title: "Verify ansible_user can connect", cast: "slide-34.cast", part: null },
  { n: 35, imgs: ["../screenshots/SSHD_hardening.png"], title: "SSHD Hardening", cast: "slide-35.cast", part: null },
  { n: 36, imgs: ["slide-36.png"], title: "Now we can ping servers", cast: "slide-36.cast", part: null },
  { n: 37, imgs: ["slide-37.png"], title: "Ad-hoc commands", cast: "slide-37.cast", part: "Part 6: Ad-hoc Commands" },
  { n: 38, imgs: ["slide-38.png"], title: "Summary", cast: null, part: null },
  { n: 39, imgs: ["slide-39.png"], title: "", cast: null, part: null },
];

// Build part label map
let cp = "";
slideData.forEach(s => { if (s.part) cp = s.part; s._partLabel = cp; });

// Build flat entries: each slide, then its demo entry (if any) immediately after
const entries = [];
slideData.forEach(s => {
  entries.push({ type: 'slide', slide: s });
  if (s.cast) {
    entries.push({ type: 'demo', slide: s });
  }
});

// ── State ─────────────────────────────────────────────────────────────────────
let current = 0;
let currentPlayer = null;

function destroyPlayer() {
  if (currentPlayer) {
    currentPlayer.dispose();
    currentPlayer = null;
  }
  document.getElementById('ap-container').innerHTML = '';
}

// ── Annotation ────────────────────────────────────────────────────────────────
let annotating = false;
let annMode    = 'laser';
let annColor   = '#ff3333';
let annDrawing = false;
let annPaths   = [];
let laserPos   = null;
let laserRaf   = null;

const annCanvas = document.getElementById('annotation-canvas');
const annCtx    = annCanvas.getContext('2d');

function toggleAnnotation() {
  annotating = !annotating;
  const toolbar = document.getElementById('annotation-toolbar');
  const btn     = document.getElementById('annotate-btn');
  if (annotating) {
    toolbar.classList.add('active');
    btn.style.background = '#3c5078';
    btn.style.borderColor = '#7aa0d4';
    btn.style.color = 'white';
    syncCanvas();
    annCanvas.style.display = 'block';
    setMode(annMode);
  } else {
    toolbar.classList.remove('active');
    btn.style.background = '#2a2a4a';
    btn.style.borderColor = '#555';
    btn.style.color = '#ccc';
    annCanvas.style.display = 'none';
    stopLaserLoop();
  }
}

function syncCanvas() {
  const content = document.getElementById('content');
  const entry   = entries[current];
  const target  = entry.type === 'slide'
    ? (document.querySelector('#slide-imgs img') || document.getElementById('slide-imgs'))
    : document.getElementById('ap-container');

  const cr = content.getBoundingClientRect();
  const tr = target.getBoundingClientRect();

  annCanvas.style.left   = (tr.left - cr.left) + 'px';
  annCanvas.style.top    = (tr.top  - cr.top + content.scrollTop) + 'px';
  annCanvas.style.width  = tr.width  + 'px';
  annCanvas.style.height = tr.height + 'px';
  annCanvas.width        = tr.width;
  annCanvas.height       = tr.height;
  redrawPaths();
}

function setMode(mode) {
  annMode = mode;
  ['laser','draw','box'].forEach(m =>
    document.getElementById('mode-' + m).classList.toggle('active', m === mode));
  annCanvas.className = mode;
  if (mode === 'laser') startLaserLoop(); else { stopLaserLoop(); redrawPaths(); }
}

function setColor(c) {
  annColor = c;
  const map = { '#ff3333': 'red', '#ffdd00': 'yellow', '#00ccff': 'cyan' };
  Object.values(map).forEach(id => document.getElementById('color-' + id).classList.remove('active'));
  if (map[c]) document.getElementById('color-' + map[c]).classList.add('active');
}

function clearAnnotations() {
  annPaths = [];
  annCtx.clearRect(0, 0, annCanvas.width, annCanvas.height);
}

function canvasPos(e) {
  const r  = annCanvas.getBoundingClientRect();
  const sx = annCanvas.width  / r.width;
  const sy = annCanvas.height / r.height;
  return { x: (e.clientX - r.left) * sx, y: (e.clientY - r.top) * sy };
}

function redrawPaths() {
  annCtx.clearRect(0, 0, annCanvas.width, annCanvas.height);
  annPaths.forEach(p => {
    annCtx.strokeStyle = p.color;
    annCtx.lineWidth   = p.size;
    annCtx.lineCap     = 'round';
    annCtx.lineJoin    = 'round';
    if (p.type === 'path') {
      annCtx.beginPath();
      p.pts.forEach((pt, i) => i === 0 ? annCtx.moveTo(pt.x, pt.y) : annCtx.lineTo(pt.x, pt.y));
      annCtx.stroke();
    } else if (p.type === 'box') {
      annCtx.strokeRect(p.x, p.y, p.w, p.h);
    }
  });
}

function startLaserLoop() {
  if (laserRaf) return;
  function frame() {
    annCtx.clearRect(0, 0, annCanvas.width, annCanvas.height);
    redrawPaths();
    if (laserPos) {
      annCtx.beginPath();
      annCtx.arc(laserPos.x, laserPos.y, 10, 0, Math.PI * 2);
      annCtx.fillStyle = annColor;
      annCtx.fill();
      annCtx.beginPath();
      annCtx.arc(laserPos.x, laserPos.y, 12, 0, Math.PI * 2);
      annCtx.strokeStyle = 'rgba(255,255,255,0.5)';
      annCtx.lineWidth = 1.5;
      annCtx.stroke();
    }
    laserRaf = requestAnimationFrame(frame);
  }
  laserRaf = requestAnimationFrame(frame);
}

function stopLaserLoop() {
  if (laserRaf) { cancelAnimationFrame(laserRaf); laserRaf = null; }
  laserPos = null;
}

annCanvas.addEventListener('mousemove', e => {
  if (!annotating) return;
  const pos = canvasPos(e);
  if (annMode === 'laser') {
    laserPos = pos;
  } else if (annMode === 'draw' && annDrawing) {
    annPaths[annPaths.length - 1].pts.push(pos);
    redrawPaths();
  } else if (annMode === 'box' && annDrawing) {
    const p = annPaths[annPaths.length - 1];
    p.w = pos.x - p.x; p.h = pos.y - p.y;
    redrawPaths();
  }
});
annCanvas.addEventListener('mouseleave', () => { laserPos = null; });
annCanvas.addEventListener('mousedown', e => {
  if (!annotating || annMode === 'laser') return;
  annDrawing = true;
  const pos = canvasPos(e);
  if (annMode === 'draw') annPaths.push({ type: 'path', color: annColor, size: 3, pts: [pos] });
  if (annMode === 'box')  annPaths.push({ type: 'box',  color: annColor, size: 2.5, x: pos.x, y: pos.y, w: 0, h: 0 });
});
annCanvas.addEventListener('mouseup', () => { annDrawing = false; });

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const entry = entries[current];
  const s     = entry.slide;

  document.getElementById('counter').textContent   = `${current + 1} / ${entries.length}`;
  document.getElementById('part-label').textContent = s._partLabel || "";

  const slideWrap = document.getElementById('slide-wrap');
  const demoWrap  = document.getElementById('demo-wrap');
  const annBtn    = document.getElementById('annotate-btn');

  if (entry.type === 'slide') {
    // ── Slide page ──
    destroyPlayer();
    slideWrap.style.display = 'block';
    demoWrap.style.display  = 'none';
    annBtn.style.display    = 'inline-block';

    const imgContainer = document.getElementById('slide-imgs');
    imgContainer.innerHTML = '';
    (s.imgs || []).forEach((src, i) => {
      const img = document.createElement('img');
      img.src = src;
      img.alt = '';
      if (i === 0 && annotating) { img.onload = syncCanvas; }
      imgContainer.appendChild(img);
    });
    document.getElementById('entry-title-text').textContent =
      s.n ? (s.title ? `Slide ${s.n} — ${s.title}` : `Slide ${s.n}`) : (s.title || '');

    annPaths = [];
    if (annotating) {
      if (!imgContainer.querySelector('img[src]')) { syncCanvas(); }
      annCanvas.style.display = 'block';
    } else {
      annCanvas.style.display = 'none';
      stopLaserLoop();
    }

  } else {
    // ── Demo page ──
    slideWrap.style.display = 'none';
    demoWrap.style.display  = 'block';
    annBtn.style.display    = 'inline-block';

    document.getElementById('entry-title-text').textContent =
      `Demo — ${s.title || 'Slide ' + s.n}`;

    destroyPlayer();

    const apContainer = document.getElementById('ap-container');
    const pending     = document.getElementById('demo-pending');

    if (s.cast === 'pending') {
      apContainer.style.display = 'none';
      pending.style.display = 'block';
    } else {
      apContainer.style.display = 'block';
      pending.style.display = 'none';
      currentPlayer = AsciinemaPlayer.create(s.cast, apContainer, {
        autoPlay: true,
        loop: true,
        fit: 'width',
        terminalFontSize: 'big',
        terminalLineHeight: 1.2,
        theme: 'monokai',
      });
    }

    // Re-sync annotation canvas position if currently annotating
    if (annotating) {
      requestAnimationFrame(syncCanvas);
    }
  }

  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === entries.length - 1;
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));
  document.getElementById('content').scrollTo(0, 0);
}

function go(dir) {
  const next = current + dir;
  if (next >= 0 && next < entries.length) { current = next; render(); }
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go(-1);
  if (e.key === 'a' || e.key === 'A') toggleAnnotation();
  if (e.key === 'Escape' && annotating) toggleAnnotation();
  if (annotating) {
    if (e.key === '1') setMode('laser');
    if (e.key === '2') setMode('draw');
    if (e.key === '3') setMode('box');
    if (e.key === 'c' || e.key === 'C') clearAnnotations();
  }
});

// ── Build dots ─────────────────────────────────────────────────────────────────
const dotsEl = document.getElementById('slide-dots');
entries.forEach((e, i) => {
  const d = document.createElement('div');
  if (e.type === 'demo') {
    d.className = e.slide.cast === 'pending' ? 'dot is-pending' : 'dot is-demo';
    d.title = `Demo: ${e.slide.title || (e.slide.n ? 'Slide ' + e.slide.n : '')}`;
  } else {
    d.className = 'dot';
    d.title = e.slide.n
      ? (e.slide.title ? `Slide ${e.slide.n}: ${e.slide.title}` : `Slide ${e.slide.n}`)
      : (e.slide.title || '');
  }
  d.onclick = () => { current = i; render(); };
  dotsEl.appendChild(d);
});

render();
</script>
</body>
</html>
